<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Weight Converter</title>
    </head>
    <body>
        <div id="input-container">
            <div>
                <label for="units">Choose units:</label>
                <select id="units">
                    <option value="ukg">Kilograms</option>
                    <option value="ulb">Pounds</option>
                <option value="ust">Stones</option>
                <option value="uoz">Ounces</option>
                <option value="ug">Grams</option>
            </select>
            </div>
        <div>
                <label for="weight">Enter weight:</label>
                <input id="weight" type="number" name="weight" required>
        </div>

        <div id="results-container">
            <div class="result">
                <span>Kilograms (KG)</span>
                <p id="kg">0</p>
            </div>
            <div class="result">
                <span>Pounds (LB)</span>
                <p id="lb">0</p>
            </div>
            <div class="result">
                <span>Stones (ST)</span>
                <p id="st">0</p>
            </div>
            <div class="result">
                <span>Ounces (OZ)</span>
                <p id="oz">0</p>
            </div>
            <div class="result">
                <span>Grams (G)</span>
                <p id="g">0</p>
            </div>
        </div>
    </body>
    <script src="script.js"></script>
</html>
